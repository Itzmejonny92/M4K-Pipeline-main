# Monitor API Key Secret
# Contains the API key for authenticating with Team Flags

apiVersion: v1
kind: Secret
metadata:
  name: monitor-secret
  # TODO: Change namespace to your team name
  namespace: m4k-gang
  labels:
    app: team-monitor
type: Opaque
stringData:
  # Insert the real API key locally before apply. Do not commit it.
  API_KEY: "REPLACE_WITH_TEAM_FLAGS_API_KEY"

