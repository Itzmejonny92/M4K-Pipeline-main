# ConfigMap - Configuration for the API
# Environment variables that the API container will use

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: m4k-gang
  labels:
    app: api
data:
  # Team information
  TEAM_NAME: "m4k-gang"
  namespace: m4k-gang

  # Redis connection
  REDIS_HOST: "redis-service"  # Kubernetes service name (DNS)
  REDIS_PORT: "6379"

  # API configuration
  PORT: "3000"

