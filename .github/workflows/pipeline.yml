name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  NODE_VERSION: "18"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/first-pipeline
  K8S_NAMESPACE: boiler-room
  APP_NAME: first-pipeline

jobs:
  ci:
    name: Build Test Scan
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.image_ref }}
      image-tag: ${{ steps.image.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Pipeline Art
        if: ${{ success() }}
        run: |
          cat <<'EOF'
            ____  _            _ _
           |  _ \(_)_ __   ___| (_)_ __   ___
           | |_) | | '_ \ / _ \ | | '_ \ / _ \
           |  __/| | |_) |  __/ | | | | |  __/
           |_|   |_| .__/ \___|_|_|_| |_|\___|
                    |_|
          EOF
          echo "Tests passed. Ready to build and publish container."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REF }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REF }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate staging secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_STAGING_B64 }}" ]; then
            echo "KUBE_CONFIG_STAGING_B64 is not set."
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "GHCR_USERNAME or GHCR_TOKEN is not set."
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Create registry pull secret
        shell: bash
        run: |
          kubectl create namespace "${{ env.K8S_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${{ env.K8S_NAMESPACE }}" create secret docker-registry ghcr-creds \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy image to staging
        shell: bash
        run: |
          mkdir -p k8s/patches
          cat > k8s/patches/configmap-version.yaml <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: first-pipeline-config
            namespace: ${K8S_NAMESPACE}
          data:
            APP_VERSION: "${{ needs.ci.outputs.image-tag }}"
          EOF

          kubectl apply -k k8s/
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/"${{ env.APP_NAME }}" \
            "${{ env.APP_NAME }}"="${{ needs.ci.outputs.image-ref }}:${{ needs.ci.outputs.image-tag }}"
          kubectl -n "${{ env.K8S_NAMESPACE }}" patch deployment "${{ env.APP_NAME }}" --type='strategic' -p \
            '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-creds"}]}}}}'
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/"${{ env.APP_NAME }}" --timeout=180s

      - name: Slack notify staging deploy success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.pull_request.title || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg text "[SUCCESS] Staging deploy completed\nRepository: ${{ github.repository }}\nAuthor: $COMMIT_AUTHOR\nCommit: $COMMIT_SHA\nMessage: $COMMIT_MESSAGE\nRun: $RUN_URL" \
            '{text: $text}')

          curl -fsS -X POST \
            -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_PRODUCTION_B64 }}" ]; then
            echo "KUBE_CONFIG_PRODUCTION_B64 is not set."
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "GHCR_USERNAME or GHCR_TOKEN is not set."
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Create registry pull secret
        shell: bash
        run: |
          kubectl create namespace "${{ env.K8S_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${{ env.K8S_NAMESPACE }}" create secret docker-registry ghcr-creds \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy image to production
        shell: bash
        run: |
          mkdir -p k8s/patches
          cat > k8s/patches/configmap-version.yaml <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: first-pipeline-config
            namespace: ${K8S_NAMESPACE}
          data:
            APP_VERSION: "${{ needs.ci.outputs.image-tag }}"
          EOF

          kubectl apply -k k8s/
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/"${{ env.APP_NAME }}" \
            "${{ env.APP_NAME }}"="${{ needs.ci.outputs.image-ref }}:${{ needs.ci.outputs.image-tag }}"
          kubectl -n "${{ env.K8S_NAMESPACE }}" patch deployment "${{ env.APP_NAME }}" --type='strategic' -p \
            '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-creds"}]}}}}'
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/"${{ env.APP_NAME }}" --timeout=180s

      - name: Slack notify production deploy success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg text "[SUCCESS] Production deploy completed\nRepository: ${{ github.repository }}\nAuthor: $COMMIT_AUTHOR\nCommit: $COMMIT_SHA\nMessage: $COMMIT_MESSAGE\nRun: $RUN_URL" \
            '{text: $text}')

          curl -fsS -X POST \
            -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

  notify-pipeline-failure:
    name: Notify Pipeline Failure
    runs-on: ubuntu-latest
    needs: [ci, deploy-staging, deploy-production]
    if: always() && (needs.ci.result == 'failure' || needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')

    steps:
      - name: Slack notify failure
        if: secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.event.pull_request.user.login || github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(jq -n \
            --arg text "[ALERT] Pipeline failed\nRepository: ${{ github.repository }}\nAuthor: $COMMIT_AUTHOR\nCommit: $COMMIT_SHA\nMessage: $COMMIT_MESSAGE\nRun: $RUN_URL" \
            '{text: $text}')

          curl -fsS -X POST \
            -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
